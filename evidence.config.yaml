appearance:
  default: system
  switcher: true

theme:
    colorPalettes:
      default:
        light:
          - "#283342"
          - "#3B82F6"
          - "#10B981"
          - "#64748B"
          - "#F59E0B"

        dark:
          - "#60A5FA"
          - "#93C5FD"
          - "#5EEAD4"
          - "#FCD34D"
          - "#C4B5FD"
          - "#94A3B8"
          - "#F87171"
          - "#34D399"

    colorScales:
      default:
        light:
          - "#DBEAFE"
          - "#123B5D"

        dark:
          - "#1E3A8A"
          - "#93C5FD"

    colors:
      primary:
        light: "#123B5D"
        dark: "#60A5FA"

      accent:
        light: "#C98B2E"
        dark: "#FCD34D"

      base:
        light: "#F7F9FB"
        dark: "#0B1220"

      info:
        light: "#0284C7"
        dark: "#38BDF8"

      positive:
        light: "#15803D"
        dark: "#4ADE80"

      warning:
        light: "#D97706"
        dark: "#FBBF24"

      negative:
        light: "#B91C1C"
        dark: "#F87171"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages. 
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }
