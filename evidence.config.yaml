appearance:
  default: light
  switcher: false

theme:
    colorPalettes:
      default:
        light:
          - "#1E3A5F"
          - "#10B981"
          - "#F97316"
          - "#8B5CF6"
          - "#2563EB"

        dark:
          - "#60A5FA"
          - "#34D399"
          - "#FB923C"
          - "#C4B5FD"
          - "#93C5FD"
          - "#94A3B8"
          - "#F87171"
          - "#5EEAD4"

    colorScales:
      default:
        light:
          - "#DBEAFE"
          - "#1E3A5F"

        dark:
          - "#1E3A8A"
          - "#93C5FD"

    colors:
      primary:
        light: "#1E3A5F"
        dark: "#60A5FA"

      accent:
        light: "#F97316"
        dark: "#FB923C"

      base:
        light: "#F8FAFC"
        dark: "#0B1220"

      info:
        light: "#2563EB"
        dark: "#60A5FA"

      positive:
        light: "#10B981"
        dark: "#34D399"

      warning:
        light: "#F97316"
        dark: "#FB923C"

      negative:
        light: "#EF4444"
        dark: "#F87171"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages.
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }
