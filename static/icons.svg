  <defs>
    <style>
      .ring-track {
        fill: none;
        stroke: rgba(108, 44, 144, 0.1);
        stroke-width: 24px;
      }

      .ring-spin {
        fill: none;
        stroke: #6c2c90;
        stroke-width: 24px;
        stroke-linecap: round;
        stroke-dasharray: 400 668;
        transform-origin: 317px 320.5px;
        animation: spinRight 1.5s linear infinite;
      }

      @keyframes spinRight {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .num {
        opacity: 0;
        transform-origin: center;
        transform-box: fill-box;
      }

      .num-1 { animation: countSeq1 2.5s infinite; }
      .num-2 { animation: countSeq2 2.5s infinite; }
      .num-3 { animation: countSeq3 2.5s infinite; }

      @keyframes countSeq1 {
        0% { opacity: 0; transform: scale(0.9); }
        15% { opacity: 1; transform: scale(1); }
        80% { opacity: 1; transform: scale(1); }
        95%, 100% { opacity: 0; transform: scale(0.9); }
      }

      @keyframes countSeq2 {
        0%, 15% { opacity: 0; transform: scale(0.9); }
        30% { opacity: 1; transform: scale(1); }
        80% { opacity: 1; transform: scale(1); }
        95%, 100% { opacity: 0; transform: scale(0.9); }
      }

      @keyframes countSeq3 {
        0%, 30% { opacity: 0; transform: scale(0.9); }
        45% { opacity: 1; transform: scale(1); }
        80% { opacity: 1; transform: scale(1); }
        95%, 100% { opacity: 0; transform: scale(0.9); }
      }
    </style>
  </defs>

